<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gridea Pro</title>
  </head>
  <body>
    <div id="global-error-display" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; color:red; z-index:999999; padding:20px; overflow:auto; white-space:pre-wrap; font-family:monospace;"></div>
    <script>
      window.addEventListener('error', function(event) {
        var display = document.getElementById('global-error-display');
        display.style.display = 'block';
        display.innerText += 'Global Error: ' + (event.error ? event.error.stack : event.message) + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        var display = document.getElementById('global-error-display');
        display.style.display = 'block';
        display.innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n\n';
      });
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
